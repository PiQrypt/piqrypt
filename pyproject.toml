[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "piqrypt"
version = "1.8.9"
description = "Trust infrastructure for autonomous AI agents â€” identity, observability, governance"
readme = "README.md"
license = {text = "MIT (AISS spec/bridges) AND Apache-2.0 (cli) AND Elastic-2.0 (aiss/vigil/trustgate)"}
authors = [
    { name = "PiQrypt Inc.", email = "contact@piqrypt.com" }
]
requires-python = ">=3.9"
keywords = [
    "cryptography", "identity", "agents", "ai", "signatures",
    "audit", "post-quantum", "langchain", "crewai", "autogen",
    "openclaw", "mcp", "trustgate", "vigil", "aiss",
    "observability", "governance", "ai-act", "anssi",
    "ros2", "raspberry-pi", "edge", "robotics", "iot"
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security :: Cryptography",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

dependencies = [
    "PyNaCl>=1.5.0",
    "canonicaljson>=2.0.0",
    "base58>=2.1.0",
    "cryptography>=41.0.0",
    "pyyaml>=6.0.0",
]

[project.optional-dependencies]
langchain = ["langchain>=0.1.0"]
crewai    = ["crewai>=0.1.0"]
autogen   = ["pyautogen>=0.2.0"]
openclaw  = []
session   = []
mcp       = ["mcp>=0.1.0"]
ollama    = ["ollama>=0.1.0"]
ros       = []
rpi       = ["RPi.GPIO>=0.7.0; sys_platform == 'linux'"]

all-bridges = [
    "langchain>=0.1.0",
    "crewai>=0.1.0",
    "pyautogen>=0.2.0",
    "ollama>=0.1.0",
    "RPi.GPIO>=0.7.0; sys_platform == 'linux'",
]

post-quantum    = ["liboqs-python>=0.8.0"]
post-quantum-py = ["dilithium-py>=0.1.0"]

dev = [
    "pytest>=7.0.0,<9.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "ruff>=0.1.0",
    "tomli>=2.0.0; python_version < '3.11'",
]

[project.scripts]
piqrypt         = "cli.main:main"
piqrypt-welcome = "cli.onboarding_welcome:main"

[project.urls]
Homepage      = "https://piqrypt.com"
Documentation = "https://github.com/piqrypt/piqrypt"
Repository    = "https://github.com/piqrypt/piqrypt"
"Bug Tracker" = "https://github.com/piqrypt/piqrypt/issues"


[tool.setuptools.packages.find]
where   = ["."]
include = [
    "piqrypt",
    "aiss*",
    "cli*",
    "vigil*",
    "trustgate*",
    "bridges*",
]
exclude = ["tests*", "docs*", "*.tests", "*.tests.*"]

[tool.setuptools.package-data]
"static"    = ["onboarding/*.html", "onboarding/**/*"]
"piqrypt"   = ["py.typed"]
"vigil"     = ["py.typed", "*.html", "*.py"]
"trustgate" = ["py.typed", "profiles/*.yaml", "console/*.html", "*.py"]
"aiss"      = ["py.typed", "schemas/*.json", "ca/*.key", "templates/*.py"]
"cli"       = ["py.typed", "*.py", "piqrypt_start.py", "auth_middleware.py"]
"bridges"   = ["py.typed"]

[tool.pytest.ini_options]
testpaths    = ["tests"]
python_files = ["test_*.py"]
addopts      = "--cov=aiss --cov-report=term-missing --cov-report=html -v"

[tool.black]
line-length    = 100
target-version = ["py39"]

[tool.ruff]
line-length    = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.ruff.lint.per-file-ignores]
"aiss/__init__.py"    = ["F401"]
"cli/__init__.py"     = ["F401"]
"piqrypt/__init__.py" = ["F401"]   # â† AJOUTÃ‰
"cli/main.py"         = ["E501"]
"aiss/*.py"           = ["E501", "E722", "E402"]
"aiss/rfc3161.py"     = ["F401"]
"bridges/**/*.py"     = ["E501"]

[tool.mypy]
python_version         = "3.9"
warn_return_any        = true
warn_unused_configs    = true
disallow_untyped_defs  = false
ignore_missing_imports = true

