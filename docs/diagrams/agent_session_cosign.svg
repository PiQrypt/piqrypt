<svg width="100%" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- Title -->
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="26" text-anchor="middle" fill="#2C2C2A">AgentSession — cross-framework co-signature</text>
<text font-family="sans-serif" font-size="12" x="340" y="44" text-anchor="middle" fill="#88878090">Three agents · Three frameworks · One verifiable session</text>
<!-- Agent A LangChain -->
<rect x="40" y="60" width="160" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="120" y="86" text-anchor="middle" fill="#085041">Agent A</text>
<text font-family="sans-serif" font-size="12" x="120" y="104" text-anchor="middle" fill="#0F6E56">LangChain</text>
<text font-family="sans-serif" font-size="12" x="120" y="120" text-anchor="middle" fill="#0F6E56">pq1_planner_…</text>
<rect x="56" y="148" width="128" height="20" rx="4" fill="none" stroke="#88878040" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="120" y="162" text-anchor="middle" fill="#5F5E5A">Ed25519 key pair A</text>
<!-- Agent B AutoGen -->
<rect x="260" y="60" width="160" height="80" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="86" text-anchor="middle" fill="#712B13">Agent B</text>
<text font-family="sans-serif" font-size="12" x="340" y="104" text-anchor="middle" fill="#993C1D">AutoGen</text>
<text font-family="sans-serif" font-size="12" x="340" y="120" text-anchor="middle" fill="#993C1D">pq1_executor_…</text>
<rect x="276" y="148" width="128" height="20" rx="4" fill="none" stroke="#88878040" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="340" y="162" text-anchor="middle" fill="#5F5E5A">Ed25519 key pair B</text>
<!-- Agent C Custom Python -->
<rect x="480" y="60" width="160" height="80" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="560" y="86" text-anchor="middle" fill="#3C3489">Agent C</text>
<text font-family="sans-serif" font-size="12" x="560" y="104" text-anchor="middle" fill="#534AB7">Custom Python</text>
<text font-family="sans-serif" font-size="12" x="560" y="120" text-anchor="middle" fill="#534AB7">pq1_reviewer_…</text>
<rect x="496" y="148" width="128" height="20" rx="4" fill="none" stroke="#88878040" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="560" y="162" text-anchor="middle" fill="#5F5E5A">Ed25519 key pair C</text>
<!-- session.start() -->
<rect x="180" y="184" width="320" height="28" rx="6" fill="none" stroke="#88878040" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-family="sans-serif" font-size="12" x="340" y="202" text-anchor="middle" fill="#5F5E5A">session.start() — N×(N−1)/2 = 3 pairwise handshakes</text>
<!-- Handshake A↔B -->
<path d="M 200 130 Q 230 180 260 130" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="230" y="178" text-anchor="middle" fill="#1D9E75" opacity="0.8">A↔B</text>
<!-- Handshake B↔C -->
<path d="M 420 130 Q 450 180 480 130" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="450" y="178" text-anchor="middle" fill="#1D9E75" opacity="0.8">B↔C</text>
<!-- Handshake A↔C -->
<path d="M 200 100 Q 340 52 480 100" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" x="340" y="56" text-anchor="middle" fill="#1D9E75" opacity="0.7">A↔C</text>
<!-- Separator -->
<line x1="40" y1="224" x2="640" y2="224" stroke="#88878030" stroke-width="0.5" stroke-dasharray="4 4"/>
<!-- Section handshake -->
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="250" text-anchor="middle" fill="#2C2C2A">What each handshake produces</text>
<!-- Steps -->
<rect x="40" y="264" width="140" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="110" y="284" text-anchor="middle" fill="#0C447C">Step 1</text>
<text font-family="sans-serif" font-size="12" x="110" y="302" text-anchor="middle" fill="#185FA5">A signs proposal</text>
<text font-family="sans-serif" font-size="12" x="110" y="318" text-anchor="middle" fill="#185FA5">+ session_nonce</text>
<line x1="180" y1="296" x2="204" y2="296" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="204" y="264" width="140" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="274" y="284" text-anchor="middle" fill="#0C447C">Step 2</text>
<text font-family="sans-serif" font-size="12" x="274" y="302" text-anchor="middle" fill="#185FA5">B verifies A sig</text>
<text font-family="sans-serif" font-size="12" x="274" y="318" text-anchor="middle" fill="#185FA5">echoes nonce</text>
<line x1="344" y1="296" x2="368" y2="296" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="368" y="264" width="140" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="438" y="284" text-anchor="middle" fill="#0C447C">Step 3</text>
<text font-family="sans-serif" font-size="12" x="438" y="302" text-anchor="middle" fill="#185FA5">2 co-signed events</text>
<text font-family="sans-serif" font-size="12" x="438" y="318" text-anchor="middle" fill="#185FA5">A chain + B chain</text>
<line x1="508" y1="296" x2="532" y2="296" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="532" y="264" width="108" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="586" y="284" text-anchor="middle" fill="#0C447C">Step 4</text>
<text font-family="sans-serif" font-size="12" x="586" y="302" text-anchor="middle" fill="#185FA5">Both stored</text>
<text font-family="sans-serif" font-size="12" x="586" y="318" text-anchor="middle" fill="#185FA5">independently</text>
<!-- Separator -->
<line x1="40" y1="346" x2="640" y2="346" stroke="#88878030" stroke-width="0.5" stroke-dasharray="4 4"/>
<!-- Interaction stamp -->
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="368" text-anchor="middle" fill="#2C2C2A">Cross-agent interaction — both chains updated</text>
<text font-family="sans-serif" font-size="12" x="340" y="386" text-anchor="middle" fill="#88878090">session.stamp("planner", "task_delegation", payload, peer="executor")</text>
<!-- Chain A -->
<rect x="40" y="400" width="260" height="76" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="170" y="422" text-anchor="middle" fill="#085041">Chain A — planner</text>
<text font-family="sans-serif" font-size="12" x="170" y="440" text-anchor="middle" fill="#0F6E56">role: initiator</text>
<text font-family="sans-serif" font-size="12" x="170" y="456" text-anchor="middle" fill="#0F6E56">interaction_hash: sha256(A:B:t)</text>
<text font-family="sans-serif" font-size="12" x="170" y="472" text-anchor="middle" fill="#0F6E56">signed by key A</text>
<!-- Same hash bridge -->
<rect x="304" y="426" width="72" height="24" rx="6" fill="none" stroke="#88878040" stroke-width="0.5" stroke-dasharray="4 3"/>
<text font-family="sans-serif" font-size="12" x="340" y="442" text-anchor="middle" fill="#5F5E5A">same hash</text>
<!-- Chain B -->
<rect x="380" y="400" width="260" height="76" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="510" y="422" text-anchor="middle" fill="#712B13">Chain B — executor</text>
<text font-family="sans-serif" font-size="12" x="510" y="440" text-anchor="middle" fill="#993C1D">role: responder</text>
<text font-family="sans-serif" font-size="12" x="510" y="456" text-anchor="middle" fill="#993C1D">interaction_hash: sha256(A:B:t)</text>
<text font-family="sans-serif" font-size="12" x="510" y="472" text-anchor="middle" fill="#993C1D">peer_sig: A's signature</text>
<!-- Arrow down -->
<line x1="340" y1="476" x2="340" y2="504" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Result -->
<rect x="80" y="504" width="520" height="72" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="528" text-anchor="middle" fill="#3C3489">Neither agent can deny the interaction</text>
<text font-family="sans-serif" font-size="12" x="340" y="548" text-anchor="middle" fill="#534AB7">Cross-framework · Offline · No shared server · Legally admissible</text>
<text font-family="sans-serif" font-size="12" x="340" y="566" text-anchor="middle" fill="#534AB7">LangChain + AutoGen + Custom Python — same session, independent keys</text>
<!-- Ecosystem note -->
<text font-family="sans-serif" font-size="12" x="340" y="606" text-anchor="middle" fill="#88878050">LangSmith · CrewAI · AutoGen · LangGraph — none offer cross-agent co-signed identity</text>
</svg>
