<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<!-- Title -->
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="26" text-anchor="middle" fill="#2C2C2A">TrustGate — governance layer</text>
<text font-family="sans-serif" font-size="12" x="340" y="44" text-anchor="middle" fill="#88878090">Advisory · not inline · every decision hash-chained</text>
<!-- Agent action -->
<rect x="240" y="56" width="200" height="48" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="78" text-anchor="middle" fill="#444441">Agent wants to act</text>
<text font-family="sans-serif" font-size="12" x="340" y="96" text-anchor="middle" fill="#5F5E5A">Any framework · Any action</text>
<line x1="340" y1="104" x2="340" y2="132" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- AISS bridge -->
<rect x="240" y="132" width="200" height="48" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="154" text-anchor="middle" fill="#0C447C">AISS bridge stamps</text>
<text font-family="sans-serif" font-size="12" x="340" y="172" text-anchor="middle" fill="#185FA5">Signed · Hash-chained · Stored</text>
<line x1="340" y1="180" x2="340" y2="208" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Vigil VRS -->
<rect x="210" y="208" width="260" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="230" text-anchor="middle" fill="#085041">Vigil computes VRS</text>
<rect x="222" y="242" width="56" height="18" rx="4" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.7"/>
<text font-family="sans-serif" font-size="12" x="250" y="255" text-anchor="middle" fill="#0F6E56">TSI 35%</text>
<rect x="284" y="242" width="52" height="18" rx="4" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.7"/>
<text font-family="sans-serif" font-size="12" x="310" y="255" text-anchor="middle" fill="#0F6E56">TS 20%</text>
<rect x="342" y="242" width="56" height="18" rx="4" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.7"/>
<text font-family="sans-serif" font-size="12" x="370" y="255" text-anchor="middle" fill="#0F6E56">A2C 30%</text>
<rect x="404" y="242" width="56" height="18" rx="4" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.7"/>
<text font-family="sans-serif" font-size="12" x="432" y="255" text-anchor="middle" fill="#0F6E56">Chain 15%</text>
<line x1="340" y1="272" x2="340" y2="300" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<!-- Policy engine -->
<rect x="210" y="300" width="260" height="48" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="322" text-anchor="middle" fill="#3C3489">Policy engine</text>
<text font-family="sans-serif" font-size="12" x="340" y="340" text-anchor="middle" fill="#534AB7">10 priority rules · Deterministic</text>
<!-- ALLOW -->
<path d="M 210 324 L 130 400" fill="none" stroke="#88878060" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="40" y="400" width="140" height="72" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="110" y="424" text-anchor="middle" fill="#27500A">ALLOW</text>
<text font-family="sans-serif" font-size="12" x="110" y="442" text-anchor="middle" fill="#3B6D11">VRS &lt; 0.35</text>
<text font-family="sans-serif" font-size="12" x="110" y="458" text-anchor="middle" fill="#3B6D11">Agent proceeds</text>
<text font-family="sans-serif" font-size="12" x="155" y="370" text-anchor="middle" fill="#88878070">Low risk</text>
<!-- REQUIRE_HUMAN -->
<line x1="340" y1="348" x2="340" y2="400" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="250" y="400" width="180" height="104" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="340" y="424" text-anchor="middle" fill="#633806">REQUIRE_HUMAN</text>
<text font-family="sans-serif" font-size="12" x="340" y="442" text-anchor="middle" fill="#854F0B">VRS ≥ 0.35</text>
<text font-family="sans-serif" font-size="12" x="340" y="458" text-anchor="middle" fill="#854F0B">Human notified</text>
<text font-family="sans-serif" font-size="12" x="340" y="474" text-anchor="middle" fill="#854F0B">TTL 300s countdown</text>
<rect x="270" y="484" width="60" height="18" rx="4" fill="none" stroke="#854F0B" stroke-width="0.5" opacity="0.8"/>
<text font-family="sans-serif" font-size="12" x="300" y="497" text-anchor="middle" fill="#854F0B">Approve</text>
<rect x="340" y="484" width="60" height="18" rx="4" fill="none" stroke="#854F0B" stroke-width="0.5" opacity="0.8"/>
<text font-family="sans-serif" font-size="12" x="370" y="497" text-anchor="middle" fill="#854F0B">Reject</text>
<text font-family="sans-serif" font-size="12" x="340" y="392" text-anchor="middle" fill="#88878070">Medium risk</text>
<!-- BLOCK -->
<path d="M 470 324 L 550 400" fill="none" stroke="#88878060" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="500" y="400" width="140" height="72" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="570" y="424" text-anchor="middle" fill="#791F1F">BLOCK</text>
<text font-family="sans-serif" font-size="12" x="570" y="442" text-anchor="middle" fill="#A32D2D">VRS ≥ 0.45</text>
<text font-family="sans-serif" font-size="12" x="570" y="458" text-anchor="middle" fill="#A32D2D">Decision logged</text>
<text font-family="sans-serif" font-size="12" x="524" y="370" text-anchor="middle" fill="#88878070">High risk</text>
<!-- Agent ignores BLOCK -->
<line x1="570" y1="472" x2="570" y2="510" stroke="#88878080" stroke-width="1.2" marker-end="url(#arrow)"/>
<rect x="460" y="510" width="200" height="80" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="560" y="532" text-anchor="middle" fill="#712B13">Agent ignores BLOCK</text>
<text font-family="sans-serif" font-size="12" x="560" y="550" text-anchor="middle" fill="#993C1D">AISS chain records action</text>
<text font-family="sans-serif" font-size="12" x="560" y="566" text-anchor="middle" fill="#993C1D">TrustGate logs BLOCK</text>
<text font-family="sans-serif" font-size="12" x="560" y="582" text-anchor="middle" fill="#993C1D">→ Proof of disobedience</text>
<!-- Two records -->
<rect x="40" y="510" width="380" height="80" rx="10" fill="none" stroke="#88878040" stroke-width="0.5" stroke-dasharray="5 3"/>
<text font-family="sans-serif" font-weight="500" font-size="14" x="230" y="534" text-anchor="middle" fill="#2C2C2A">Two independent signed records</text>
<rect x="56" y="546" width="154" height="24" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="133" y="562" text-anchor="middle" fill="#185FA5">TrustGate audit journal</text>
<rect x="222" y="546" width="182" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" x="313" y="562" text-anchor="middle" fill="#534AB7">AISS chain — agent signed</text>
<text font-family="sans-serif" font-size="12" x="230" y="594" text-anchor="middle" fill="#88878070">Legally admissible · No infra access needed · Offline verifiable</text>
</svg>
